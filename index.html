                                    </button>

                                    <div className="text-center mb-8">
                                        <div className="w-12 h-12 rounded-full bg-gradient-to-tr from-gold to-yellow-200 shadow-[0_0_15px_rgba(212,175,55,0.4)] mx-auto mb-4"></div>
                                        <h2 className="text-3xl font-display font-bold mb-2">
                                            {isLoginMode ? "Welcome Back" : "Join Aetheria"}
                                        </h2>
                                        <p className="text-gray-400 text-sm">
                                            {isLoginMode ? "Sign in to access The Vault and your bookings." : "Create an account to securely store your preferences."}
                                        </p>
                                    </div>

                                    <form onSubmit={handleAuthSubmit} className="space-y-4">
                                        <div>
                                            <label className="text-xs text-gray-400 uppercase tracking-widest block mb-1">Email</label>
                                            <input type="email" required placeholder="name@example.com" className="w-full bg-white/5 border border-white/10 rounded-lg p-3 focus:outline-none focus:border-gold transition-colors text-white" />
                                        </div>
                                        <div>
                                            <label className="text-xs text-gray-400 uppercase tracking-widest block mb-1">Password</label>
                                            <input type="password" required placeholder="••••••••" className="w-full bg-white/5 border border-white/10 rounded-lg p-3 focus:outline-none focus:border-gold transition-colors text-white" />
                                        </div>

                                        <button type="submit" className="w-full bg-gradient-to-r from-gold to-yellow-500 text-obsidian font-bold py-3 rounded-lg shadow-lg hover:shadow-gold/30 transition-all mt-4">
                                            {isLoginMode ? "Sign In" : "Sign Up"}
                                        </button>
                                    </form>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Highly Detailed Hotel Info & Calculator Modal */}
                    <AnimatePresence>
                        {selectedHotelInfo && (
                            <motion.div
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md p-4 overflow-y-auto pt-20 pb-20"
                            >
                                <motion.div
                                    initial={{ scale: 0.95, y: 20 }}
                                    animate={{ scale: 1, y: 0 }}
                                    exit={{ scale: 0.95, y: 20 }}
                                    className="glass w-full max-w-4xl rounded-2xl overflow-hidden shadow-2xl border border-gold/20 flex flex-col md:flex-row relative"
                                >
                                    <button
                                        onClick={() => setSelectedHotelInfo(null)}
                                        className="absolute top-4 right-4 z-10 bg-black/50 hover:bg-black text-white p-2 rounded-full backdrop-blur-md transition-colors"
                                    >
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>

                                    {/* Left Side - Image Gallery using Unsplash Realistic Photos */}
                                    <div className="md:w-1/2 flex flex-col">
                                        <div className="relative h-64 md:h-80 w-full group">
                                            <img
                                                src={selectedHotelInfo.images[activeImageIndex]}
                                                alt={selectedHotelInfo.name}
                                                className="w-full h-full object-cover transition-opacity duration-300"
                                            />
                                            <div className="absolute inset-0 bg-gradient-to-t from-obsidian to-transparent opacity-80 md:hidden"></div>

                                            <button
                                                onClick={() => setActiveImageIndex((prev) => prev === 0 ? selectedHotelInfo.images.length - 1 : prev - 1)}
                                                className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/40 p-2 rounded-full hover:bg-gold transition-colors opacity-0 group-hover:opacity-100"
                                            >
                                                <i data-lucide="chevron-left" className="w-5 h-5"></i>
                                            </button>
                                            <button
                                                onClick={() => setActiveImageIndex((prev) => prev === selectedHotelInfo.images.length - 1 ? 0 : prev + 1)}
                                                className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/40 p-2 rounded-full hover:bg-gold transition-colors opacity-0 group-hover:opacity-100"
                                            >
                                                <i data-lucide="chevron-right" className="w-5 h-5"></i>
                                            </button>
                                        </div>
                                        <div className="flex p-2 gap-2 overflow-x-auto no-scrollbar bg-black/30">
                                            {selectedHotelInfo.images.map((img, idx) => (
                                                <img
                                                    key={idx}
                                                    src={img}
                                                    onClick={() => setActiveImageIndex(idx)}
                                                    className={`w-20 h-16 object-cover rounded cursor-pointer transition-all ${activeImageIndex === idx ? 'border-2 border-gold opacity-100' : 'opacity-50 hover:opacity-100'}`}
                                                    alt="Thumbnail"
                                                />
                                            ))}
                                        </div>
                                    </div>

                                    {/* Right Side - Details & Dynamic Calculator */}
                                    <div className="p-6 md:p-8 md:w-1/2 flex flex-col justify-between relative bg-obsidian">

                                        {bookingConfirmed ? (
                                            <motion.div
                                                initial={{ opacity: 0 }}
                                                animate={{ opacity: 1 }}
                                                className="py-20 text-center my-auto"
                                            >
                                                <div className="w-20 h-20 bg-gold/20 rounded-full flex items-center justify-center mx-auto mb-6">
                                                    <i data-lucide="check" className="w-10 h-10 text-gold"></i>
                                                </div>
                                                <h3 className="text-3xl font-display text-white mb-2">Booking Confirmed!</h3>
                                                <p className="text-gray-400">Your reservation has been secured and added to The Vault.</p>
                                            </motion.div>
                                        ) : (
                                            <div className="space-y-6">
                                                <div>
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className="bg-gold/20 text-gold text-xs px-2 py-0.5 rounded font-semibold flex items-center gap-1">
                                                            <i data-lucide="star" className="w-3 h-3 fill-gold"></i> {selectedHotelInfo.rating}
                                                        </span>
                                                        <h2 className="text-3xl font-display font-bold text-white">{selectedHotelInfo.name}</h2>
                                                    </div>
                                                    <p className="text-sm text-gray-400 flex items-center gap-1 mb-4"><i data-lucide="map-pin" className="w-4 h-4 text-gold"></i> {selectedHotelInfo.location}</p>
                                                    <div className="flex gap-2 flex-wrap mb-4">
                                                        {selectedHotelInfo.amenities.map(am => (
                                                            <span key={am} className="text-xs border border-white/20 text-gray-300 px-2 py-1 rounded-full">{am}</span>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="bg-white/5 border border-white/10 rounded-xl p-5">
                                                    <h4 className="text-sm font-semibold uppercase tracking-widest text-gold mb-4">Integrated Booking Calculator</h4>
                                                    <div className="grid grid-cols-2 gap-4 mb-4">
                                                        <div>
                                                            <label className="text-xs text-gray-400 uppercase tracking-wider mb-1 block">Check-in</label>
                                                            <input type="date" value={checkIn} onChange={(e) => setCheckIn(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-lg p-2.5 text-sm focus:border-gold outline-none transition-colors" />
                                                        </div>
                                                        <div>
                                                            <label className="text-xs text-gray-400 uppercase tracking-wider mb-1 block">Check-out</label>
                                                            <input type="date" value={checkOut} onChange={(e) => setCheckOut(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-lg p-2.5 text-sm focus:border-gold outline-none transition-colors" />
                                                        </div>
                                                    </div>

                                                    <div className="border-t border-white/10 pt-4">
                                                        <div className="flex justify-between mb-2 text-sm text-gray-300">
                                                            <span>Rate per night</span>
                                                            <span>${selectedHotelInfo.price}</span>
                                                        </div>
                                                        <div className="flex justify-between mb-2 text-sm text-gray-300">
                                                            <span>Nights selected</span>
                                                            <span>{daysDiff}</span>
                                                        </div>
                                                        <div className="flex justify-between mb-2 text-sm text-gray-300">
                                                            <span>Taxes & hidden fees</span>
                                                            <span className="text-gold text-xs px-2 py-0.5 bg-gold/10 rounded">Zero Fees</span>
                                                        </div>
                                                        <div className="border-t border-white/10 mt-3 pt-3 flex justify-between items-end">
                                                            <span className="text-lg font-medium text-white">Total Calculator</span>
                                                            <span className="text-3xl font-display font-semibold text-gold">${selectedHotelInfo.price * daysDiff}</span>
                                                        </div>
                                                    </div>
                                                </div>

                                                <button
                                                    onClick={confirmBooking}
                                                    className="w-full bg-gradient-to-r from-gold to-yellow-500 hover:from-yellow-400 hover:to-yellow-300 text-obsidian font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(212,175,55,0.3)] hover:shadow-[0_0_25px_rgba(212,175,55,0.5)] transition-all flex justify-center items-center gap-2 text-lg"
                                                >
                                                    <i data-lucide="lock" className="w-5 h-5"></i>
                                                    Process to Vault
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* The Vault Modal (My Bookings) with Cancel Feature */}
                    <AnimatePresence>
                        {showVault && (
                            <motion.div
                                initial={{ opacity: 0, x: 20 }}
                                animate={{ opacity: 1, x: 0 }}
                                exit={{ opacity: 0, x: 20 }}
                                className="fixed top-0 right-0 h-full w-full sm:w-[400px] glass z-[70] shadow-2xl border-l border-gold/20 flex flex-col"
                            >
                                <div className="p-6 border-b border-white/10 flex justify-between items-center bg-obsidian">
                                    <div className="flex items-center gap-2">
                                        <i data-lucide="bookmark" className="text-gold w-6 h-6"></i>
                                        <h2 className="text-2xl font-display font-bold text-white">The Vault</h2>
                                    </div>
                                    <button onClick={() => setShowVault(false)} className="text-gray-400 hover:text-white transition-colors">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>

                                <div className="flex-grow p-6 overflow-y-auto no-scrollbar bg-black/50">
                                    {userBookings.length === 0 ? (
                                        <div className="text-center text-gray-400 mt-20">
                                            <i data-lucide="briefcase" className="w-12 h-12 mx-auto mb-4 opacity-50"></i>
                                            <p>Your vault is empty.</p>
                                            <p className="text-sm">Book a residence to see it here.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {userBookings.map((booking) => (
                                                <div key={booking.id} className="bg-white/5 border border-white/10 rounded-xl p-4 hover:border-gold/50 transition-colors">
                                                    <div className="flex gap-4">
                                                        <img src={booking.image} alt={booking.hotel} className="w-24 h-24 object-cover rounded-lg" />
                                                        <div className="flex flex-col justify-between flex-grow">
                                                            <div>
                                                                <h4 className="font-display font-semibold text-white">{booking.hotel}</h4>
                                                                <div className="text-xs text-gray-400 flex items-center gap-1 mb-2"><i data-lucide="map-pin" className="w-3 h-3 text-gold"></i> {booking.location}</div>
                                                                <div className="text-xs text-gray-300">
                                                                    <i data-lucide="calendar" className="w-3 h-3 inline mr-1"></i>
                                                                    {booking.checkIn} to {booking.checkOut} ({booking.nights} nts)
                                                                </div>
                                                            </div>
                                                            <div className="flex justify-between items-end mt-3 border-t border-white/10 pt-2">
                                                                <button
                                                                    onClick={() => cancelBooking(booking.id)}
                                                                    className="text-xs text-red-500 hover:text-red-400 flex items-center gap-1 transition-colors"
                                                                >
                                                                    <i data-lucide="x-circle" className="w-3 h-3"></i> Cancel Booking
                                                                </button>
                                                                <span className="text-gold font-bold font-display">${booking.totalPrice}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="p-6 border-t border-white/10 bg-obsidian">
                                    <button
                                        onClick={handleLogOut}
                                        className="w-full border border-red-500/50 text-red-500 hover:bg-red-500/10 py-3 rounded-lg font-medium transition-colors"
                                    >
                                        Log Out
                                    </button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
